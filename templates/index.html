<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Alchemist | LSTM Prediction</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center font-['Outfit'] antialiased relative overflow-hidden">
    
    <!-- Ambient Gradients -->
    <div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-emerald-500/20 blur-[150px] rounded-full pointer-events-none"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-blue-600/20 blur-[150px] rounded-full pointer-events-none"></div>
    <div class="absolute top-[40%] left-[50%] w-[30%] h-[30%] bg-teal-500/10 blur-[120px] rounded-full pointer-events-none -translate-x-1/2 -translate-y-1/2"></div>

    <div class="w-full max-w-lg p-8 mx-4 z-10">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl mb-4 backdrop-blur-md shadow-[0_0_20px_rgba(16,185,129,0.2)]">
                <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-200 via-emerald-400 to-teal-500 bg-clip-text text-transparent mb-2">Gold Alchemist - Oracle</h1>
            <p class="text-gray-400 font-light">Deep Learning (LSTM) 30-Day Price Forecaster</p>
        </div>

        <!-- Form Card / Button -->
        <div class="glass-card rounded-3xl p-8 shadow-2xl border border-white/5 backdrop-blur-xl bg-gray-900/40 text-center transform transition-all duration-300 hover:border-white/10 hover:bg-gray-900/50">
            <p class="text-gray-300 mb-6 text-sm">
                Utilize the last 30 days of historical data (RSI, MACD, Bollinger Bands, Volume, and OHLC points) to forecast tomorrow's close price instantly.
            </p>
            <button id="predict-btn" class="w-full relative group overflow-hidden rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 p-[1px] transition-all hover:scale-[1.02] hover:shadow-[0_0_20px_rgba(16,185,129,0.4)] active:scale-[0.98]">
                <div class="flex h-full w-full items-center justify-center bg-gray-950/20 py-4 rounded-[11px] font-semibold text-white tracking-wide transition-colors group-hover:bg-transparent">
                    <span id="btn-text">Consult The Oracle</span>
                    <div id="btn-loader" class="hidden ml-3 w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                </div>
            </button>
        </div>

        <!-- Error Panel -->
        <div id="error-panel" class="hidden mt-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-200 text-sm text-center backdrop-blur-sm">
        </div>

        <!-- Results Panel -->
        <div id="results-panel" class="hidden mt-6 translate-y-4 opacity-0 transition-all duration-500 glass-card rounded-3xl p-6 shadow-2xl border border-white/5 backdrop-blur-xl bg-gray-900/60 relative overflow-hidden">
            <div class="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
            
            <h3 class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-6 text-center">Prediction Results</h3>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <!-- Today's Close -->
                <div class="bg-black/40 rounded-2xl p-4 border border-gray-800/50 flex flex-col items-center justify-center">
                    <span class="text-gray-400 text-xs font-semibold uppercase tracking-wider mb-1">Today's Close</span>
                    <span id="res-current" class="text-2xl font-bold bg-gradient-to-r from-gray-300 to-gray-500 bg-clip-text text-transparent">$0.00</span>
                </div>
                <!-- Tomorrows Forecast -->
                <div class="bg-black/40 rounded-2xl p-4 border border-gray-800/50 flex flex-col items-center justify-center relative overflow-hidden">
                    <span class="text-gray-400 text-xs font-semibold uppercase tracking-wider mb-1">Tomorrow's Forecast</span>
                    <span id="res-predict" class="text-2xl font-bold text-white z-10">$0.00</span>
                    <div id="trend-glow" class="absolute inset-0 opacity-20 blur-md z-0 transition-colors duration-300"></div>
                </div>
            </div>

            <!-- Trend Badge -->
            <div id="trend-container" class="rounded-xl p-4 flex items-center justify-center gap-3 border backdrop-blur-sm shadow-lg transition-all duration-300">
                <span id="trend-icon" class="text-xl"></span>
                <span id="trend-text" class="font-bold tracking-wide"></span>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
